# Blueprint do Render: https://render.com/docs/blueprint-spec
# No dashboard: New + Blueprint → conecte o repositório que contém este arquivo.

services:
  - type: web
    name: scancontrol
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scancontrol-db
          property: connectionString

databases:
  - name: scancontrol-db
    plan: free
    databaseName: scancontrol
    user: scancontrol
